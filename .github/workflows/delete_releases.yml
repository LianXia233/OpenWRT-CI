name: Delete All Release Assets

on:
  workflow_dispatch:

jobs:
  delete-release-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all release assets using GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          echo "Fetching releases for ${OWNER}/${REPO}..."
          releases=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" "https://api.github.com/repos/${OWNER}/${REPO}/releases")
          echo "$releases" | jq -c '.[]' | while read -r release; do
              release_id=$(echo "$release" | jq -r '.id')
              echo "Processing release ID: ${release_id}"
              assets=$(echo "$release" | jq -c '.assets[]?')
              if [ -z "$assets" ]; then
                  echo "No assets found in release ${release_id}"
                  continue
              fi
              echo "$assets" | while read -r asset; do
                  asset_id=$(echo "$asset" | jq -r '.id')
                  asset_name=$(echo "$asset" | jq -r '.name')
                  echo "Deleting asset '${asset_name}' (ID: ${asset_id}) from release ${release_id}..."
                  curl -s -X DELETE -H "Authorization: token ${GITHUB_TOKEN}" "https://api.github.com/repos/${OWNER}/${REPO}/releases/assets/${asset_id}"
              done
          done
          echo "All release assets have been deleted."
        shell: bash
