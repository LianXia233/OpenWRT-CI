name: Delete all releases

on:
  workflow_dispatch:

jobs:
  delete_releases:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4  # 更新至最新版本

    - name: List all releases
      id: list_releases
      uses: octokit/request-action@v2.x
      with:
        route: GET /repos/${{ github.repository }}/releases
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete each release
      if: steps.list_releases.outputs.data != '[]'
      run: |
        set -e  # 启用错误退出
        echo "${{ steps.list_releases.outputs.data }}" > releases.json
        releases=$(jq -r '.[].id' releases.json)

        for release_id in $releases; do
          echo "Deleting release with ID: $release_id"
          curl -s -X DELETE \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/$release_id" \
            || exit 1
          sleep 1  # 避免触发速率限制
        done
