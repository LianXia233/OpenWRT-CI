version: 2.1

# ==================== 参数定义 ====================
parameters:
  PACKAGE:
    type: string
    default: ""
    description: "手动调整插件包，多个请用空格或换行隔开"
  TEST:
    type: boolean
    default: false
    description: "仅输出配置文件，不编译固件"

# ==================== 工作流 ====================
workflows:
  MTK-ALL:
    jobs:
      - build-mtk:
          name: "<< matrix.CONFIG >>"
          matrix:
            parameters:
              CONFIG:
                - MEDIATEK-WIFI-YES
                - MEDIATEK-WIFI-NO
          # 以下参数可通过 workflow_dispatch 传入
          package: << pipeline.parameters.PACKAGE >>
          test: << pipeline.parameters.TEST >>

# ==================== Job 定义 ====================
jobs:
  build-mtk:
    parameters:
      CONFIG:
        type: string
      package:
        type: string
        default: ""
      test:
        type: boolean
        default: false

    machine:
      image: ubuntu-2204:current   # 或使用 docker executor
    resource_class: medium         # 根据需要调整：small / medium / large / xlarge

    steps:
      - checkout

      - run:
          name: "准备环境"
          command: |
            sudo apt-get update && sudo apt-get install -y git curl wget rsync

      - run:
          name: "执行 WRT-CORE 逻辑"
          command: |
            echo "CONFIG = $CONFIG"
            echo "PACKAGE = $package"
            echo "TEST = $test"

            # 这里需要把原来 WRT-CORE.yml 的逻辑移植过来
            # 或者调用脚本实现相同功能

            if [ "$test" = "true" ]; then
              echo "仅输出配置文件模式"
              # 执行输出配置的命令
            else
              echo "开始编译固件..."
              # 执行编译命令
            fi

      - when:
          condition: << parameters.test >>
          steps:
            - run:
                name: "测试模式 - 只生成配置"
                command: echo "配置生成完成"

      - persist_to_workspace:
          root: /tmp
          paths:
            - firmware   # 根据实际输出路径调整
