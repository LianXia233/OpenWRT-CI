version: 2.1

parameters:
  PACKAGE:
    type: string
    default: ""
    description: "手动调整插件包，多个请用空格隔开"

  TEST:
    type: boolean
    default: false
    description: "仅生成配置文件，不编译固件"

workflows:
  MTK-ALL:
    jobs:
      - build-wrt:
          matrix:
            parameters:
              CONFIG:
                - MEDIATEK-WIFI-YES
              
          package: << pipeline.parameters.PACKAGE >>
          test: << pipeline.parameters.TEST >>

jobs:
  build-wrt:
    parameters:
      CONFIG:
        type: string

      package:
        type: string
        default: ""

      test:
        type: boolean
        default: false

    working_directory: ~/

    machine:
      image: ubuntu-2204:current

    resource_class: large

    environment:
      WRT_CONFIG: << parameters.CONFIG >>
      WRT_THEME: aurora
      WRT_NAME: OWRT
      WRT_SSID: OWRT
      WRT_WORD: 12345678
      WRT_IP: 192.168.10.1
      WRT_PW: 无

      WRT_REPO: https://github.com/immortalwrt/immortalwrt.git
      WRT_BRANCH: master
      WRT_SOURCE: immortalwrt/immortalwrt

      WRT_PACKAGE: << parameters.package >>
      WRT_TEST: << parameters.test >>

    steps:
      - checkout

      ###########################################################

      - run:
          name: Initialization Environment
          command: |
            set -euo pipefail

            export DEBIAN_FRONTEND=noninteractive

            sudo apt-get update -qq

            sudo apt-get install -y \
              build-essential \
              curl \
              dos2unix \
              git \
              jq \
              libfuse-dev

            sudo bash -c 'bash <(curl -fsSL https://build-scripts.immortalwrt.org/init_build_environment.sh)'

            sudo timedatectl set-timezone Asia/Shanghai

            sudo mkdir -p /mnt/build_wrt
            sudo chown -R "$USER:$USER" /mnt/build_wrt

            ln -snf /mnt/build_wrt "$HOME/wrt"

      ###########################################################

      - run:
          name: Initialization Values
          command: |
            echo "WRT_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $BASH_ENV
            echo "WRT_MARK=VIKINGYFY" >> $BASH_ENV
            echo "WRT_INFO=immortalwrt" >> $BASH_ENV

            echo "WRT_TARGET=$(grep -m1 -oP '^CONFIG_TARGET_\K[\w]+(?==y)' ./Config/$WRT_CONFIG.txt || echo generic)" >> $BASH_ENV

            echo "WRT_WIFI=wifi-yes" >> $BASH_ENV
            echo "WRT_KVER=none" >> $BASH_ENV
            echo "WRT_LIST=none" >> $BASH_ENV
            echo "WRT_HASH=unknown" >> $BASH_ENV

      ###########################################################

      - run:
          name: Clone Source
          command: |
            set -e

            git clone \
              --filter=blob:none \
              --depth=1 \
              --single-branch \
              --branch "$WRT_BRANCH" \
              "$WRT_REPO" \
              ./wrt

            cd ./wrt

            echo "WRT_HASH=$(git rev-parse --short HEAD)" >> $BASH_ENV

            if [ -f "./scripts/projectsmirrors.json" ]; then
              sed -i '/.cn\//d;/aliyun/d;/tencent/d' ./scripts/projectsmirrors.json
            fi

      ###########################################################

      - run:
          name: Normalize Scripts
          command: |
            find ./ -maxdepth 3 \
              -type f \
              -iregex ".*\.\(sh\|txt\)$" \
              -exec dos2unix {} \; \
              -exec chmod +x {} \;

      ###########################################################

      - restore_cache:
          keys:
            - v2-build-cache-{{ .Environment.WRT_CONFIG }}-{{ .Environment.WRT_INFO }}-{{ .Environment.WRT_HASH }}
            - v2-build-cache-{{ .Environment.WRT_CONFIG }}-{{ .Environment.WRT_INFO }}

      ###########################################################

      - run:
          name: Restore Build Cache
          command: |
            cd ./wrt

            if [ -d staging_dir ]; then
              find staging_dir \
                -type d \
                -name stamp \
                -not -path "*target*" |
              while read d
              do
                find "$d" -type f -exec touch {} +
              done
            fi

      ###########################################################

      - run:
          name: Update Feeds
          command: |
            cd ./wrt

            ./scripts/feeds update -a -f
            ./scripts/feeds install -a

      ###########################################################

      - run:
          name: Custom Packages
          command: |
            cd ./wrt/package

            "$HOME/Scripts/Packages.sh"

            "$HOME/Scripts/Handles.sh"

      ###########################################################

      - run:
          name: Custom Settings
          command: |
            cd ./wrt

            if [[ "${WRT_CONFIG,,}" == *test* ]]; then
              cat "$HOME/Config/$WRT_CONFIG.txt" >> .config
            else
              cat \
                "$HOME/Config/$WRT_CONFIG.txt" \
                "$HOME/Config/GENERAL.txt" >> .config
            fi

            "$HOME/Scripts/Settings.sh"

            make defconfig

            echo "========== TARGET =========="
            grep '^CONFIG_TARGET' .config || true

            echo "========== H5000M =========="
            grep 'h5000m' .config || true

            echo "========== MT5700M =========="
            grep 'mt5700m' .config || true

      ###########################################################

      - run:
          name: Download Sources
          command: |
            if [ "$WRT_TEST" != "true" ]; then
              cd ./wrt

              make download -j"$(nproc)" || \
              make download -j1 V=s
            fi

      ###########################################################

      - run:
          name: Compile Firmware
          no_output_timeout: 3h
          command: |
            if [ "$WRT_TEST" != "true" ]; then
              cd ./wrt

              make -j"$(nproc)" || \
              make -j4 V=s || \
              make -j1 V=s
            fi

      ###########################################################

      - run:
          name: Package Firmware
          when: always
          command: |
            cd ./wrt

            mkdir -p upload/logs

            cp .config upload/logs/

            if [ -d logs ]; then
              find logs -type f -exec cp {} upload/logs/ \;
            fi

            cp .config \
              upload/Config-"$WRT_CONFIG"-"$WRT_INFO"-"$WRT_BRANCH"-"$WRT_DATE".txt || true

            if [ "$WRT_TEST" != "true" ]; then

              find bin/targets \
                -iregex ".*\.\(buildinfo\|json\|sha256sums\|packages\)$" \
                -delete

              find bin/targets -type f -exec mv -f {} upload/ \;
            fi

      ###########################################################

      - store_artifacts:
          path: ./wrt/upload
          destination: firmware

      ###########################################################

      - run:
          name: Machine Information
          when: always
          command: |
            echo "=========================="
            lscpu
            echo "--------------------------"
            free -h
            echo "--------------------------"
            df -h
            echo "--------------------------"
            du -sh ./wrt/* 2>/dev/null || true
            echo "=========================="

      ###########################################################

      - save_cache:
          key: v2-build-cache-{{ .Environment.WRT_CONFIG }}-{{ .Environment.WRT_INFO }}-{{ .Environment.WRT_HASH }}
          paths:
            - ./wrt/.ccache
            - ./wrt/staging_dir
            - ./wrt/dl
